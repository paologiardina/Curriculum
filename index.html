<!doctype html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paolo Giardina – Analista Funzionale Senior</title>

  <!-- SEO & LinkedIn preview -->
  <meta name="description"
    content="Paolo Giardina – Analista Funzionale Senior, Business Analyst con esperienza in Web & Digital Solutions" />
  <meta property="og:title" content="Paolo Giardina – Analista Funzionale Senior, Business Analyst" />
  <meta property="og:description" content="Curriculum professionale" />
  <meta property="og:type" content="profile" />
  <meta property="og:image" content="https://picsum.photos/1100/180" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="styles/main.css" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded mb-4">
    <div class="container">
      <!-- Icona profilo + campo di ricerca -->
      <form id="searchForm" class="d-flex flex-grow-1 me-3 align-items-center" role="search">
        <i class="bi bi-person-badge fs-2 text-primary me-2 fixed-icon-size"></i>
        <input id="searchInput" class="form-control me-2" type="search" placeholder="Cerca chiave..."
          aria-label="Search" />
        <button class="btn btn-outline-primary" type="submit">
          <i class="bi bi-search"></i>
        </button>
      </form>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
        aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0" id="navbarList">
        </ul>
      </div>
    </div>
  </nav>
  <div class="container my-4 content-wrapper">
    <div class="profile-card">
      <!-- COVER -->
      <div class="profile-cover" id="profile-cover"></div>

      <!-- HEADER -->
      <div class="px-4 pb-4">
        <img src="" alt="" id="profile-img" class="profile-img" />

        <h1 class="mt-3" id="profile-name"></h1>

        <div class="headline" id="profile-role"></div>

        <p class="text-muted small mb-2" id="profile-location"></p>

        <!-- METADATI PERSONALI -->
        <p class="text-muted small mb-2" id="profile-experience"></p>

        <!-- CONTATTI -->
        <p class="small mb-3">
          <i class="bi bi-envelope"></i>
          <a href="" target="_blank" class="text-decoration-none" id="profile-email"></a>

          &nbsp;·&nbsp;
          <i class="bi bi-linkedin"></i>
          <a href="" target="_blank" class="text-decoration-none" id="profile-linkedin">LinkedIn</a>
        </p>

        <!-- DOWNLOAD CV -->
        <a href="" class="btn btn-outline-primary btn-sm" download id="profile-cv">
          <i class="bi bi-download"></i> Scarica CV (PDF)
        </a>
      </div>
    </div>

    <div class="row mt-4">
      <!-- MAIN COLUMN -->
      <div class="col-md-8">
        <div class="profile-card p-4 mb-3" id="informazioni">
          <div class="section-title">Informazioni</div>
          <p id="profile-informazioni"></p>
        </div>
        <div class="profile-card p-4 mb-3" id="esperienza">
          <div class="section-title">Esperienza</div>
          <div id="experience-list"></div>
        </div>
      </div>
      <!-- SIDEBAR -->
      <div class="col-md-4">
        <div class="profile-card p-4 mb-3" id="competenze">
          <div class="section-title">Competenze Professionali</div>

          <div class="skill-badges d-flex flex-wrap gap-2">

          </div>
        </div>

        <div class="profile-card p-4 mb-3" id="soft-skills">
          <div class="section-title">Soft Skills</div>
          <div class="skill-badges d-flex flex-wrap gap-2">
          </div>
        </div>

        <div class="profile-card p-4 mb-3" id="formazione">
          <div class="section-title">Formazione</div>
          <div class="education-details">
          </div>
        </div>

        <div class="profile-card p-4" id="lingue">
          <div class="section-title">Lingue</div>
          <div class="language-details">
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="bg-white border-top mt-5 py-4" id="footer">
    <div class="container">
      <div class="row text-muted">
        <!-- PRIMA COLONNA: ICONA + NOME -->
        <div class="col-md-4 mb-3 d-flex align-items-start" id="footer-info">
        </div>

        <!-- LINK RAPIDI -->
        <div class="col-md-4 mb-3" id="footer-links">
          <h6 class="fw-bold text-dark">Link Rapidi</h6>
          <ul class="list-unstyled mb-0">
          </ul>
        </div>

        <!-- SOCIAL -->
        <div class="col-md-4 mb-3" id="footer-social">
          <h6 class="fw-bold text-dark">Seguimi</h6>
        </div>
      </div>

      <div class="text-center text-muted mt-3 footer-note" id="footer-note">
      </div>
    </div>
  </footer>
  <!-- Back to Top Button -->
  <button id="backToTopBtn" title="Torna su">
    <i class="bi bi-arrow-up-circle-fill"></i>
  </button>
  <!-- Bootstrap JS + Popper -->
  <!-- jQuery (required by custom scripts) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
  <script src="scripts/main.js"></script>
</body>

</html>
