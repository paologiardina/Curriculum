  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

<body>

        <i class="bi bi-person-badge fs-2 text-primary me-2 fixed-icon-size"></i>

        <button class="btn btn-outline-primary" type="submit">

        </button>
        <div class="d-flex align-items-center ms-4">
          <button type="button" id="langIt" class="btn border-0 btn-sm" title="Passa a Italiano"

          </button>

        <div class="profile-card p-4 mb-3" id="informazioni">
